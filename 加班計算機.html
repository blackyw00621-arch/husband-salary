<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人薪資對帳工具 (鋒型雙軌精準版)</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        .config-box { background: #eef2f7; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 20px; align-items: center; justify-content: space-around; flex-wrap: wrap; }
        .config-box label { font-weight: bold; }
        .config-box input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 120px; }
        .import-box { background: #e8f8f5; border: 2px dashed #2ecc71; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .import-btn-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .btn-import { background-color: #2ecc71; color: white; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; border: none; transition: 0.2s; }
        .btn-import:hover { background-color: #27ae60; }
        #excelFile { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; background: #fff; padding: 15px; border: 1px solid #e0e0e0; border-radius: 8px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .form-group input, .form-group select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; height: 38px; box-sizing: border-box; }
        button { background-color: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; width: 100%; transition: 0.2s; height: 38px; }
        button:hover { background-color: #219653; }
        .table-responsive { margin-top: 25px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px 8px; text-align: center; }
        th { background-color: #34495e; color: white; font-weight: 500; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .total-box { margin-top: 20px; background: #fdf2e9; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;}
        .clear-btn { background-color: #e74c3c; width: auto; }
        .clear-btn:hover { background-color: #c0392b; }
        .badge { padding: 4px 8px; border-radius: 4px; color: white; font-size: 12px; font-weight: bold; display: inline-block; }
        .bg-weekday { background-color: #3498db; }
        .bg-restday { background-color: #e67e22; }
        .bg-leave-full { background-color: #2ecc71; }
        .bg-leave-half { background-color: #9b59b6; }
        .bg-leave-none { background-color: #e74c3c; }
        .summary-item { font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 勞基法出勤、加班與請假全功能對帳工具 (雙軌精準版)</h2>
    
    <div class="config-box">
        <div>
            <label>目前底薪 (元)：</label>
            <input type="number" id="monthlySalary" value="36800" onchange="updateHourlyWage()">
        </div>
        <div>
            <label>指導/領導加給 (元)：</label>
            <input type="number" id="leaderAllowance" value="3000" onchange="updateHourlyWage()">
        </div>
        <div>
            <label>加班費計算時薪：</label>
            <span id="hourlyWageText" style="color:#d35400; font-weight:bold;">0</span> 元
        </div>
        <div>
            <label>請假扣薪計算時薪：</label>
            <span id="leaveHourlyWageText" style="color:#c0392b; font-weight:bold;">0</span> 元
        </div>
    </div>

    <div class="import-box">
        <span style="font-weight: bold; color: #16a085;">🚀 智慧對帳功能：</span>
        <div class="import-btn-wrapper">
            <button class="btn-import">選擇匯入鋒型系統 EXCEL / CSV 檔案</button>
            <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" onchange="handleFile(this)">
        </div>
        <span style="font-size: 13px; color: #7f8c8d;">(自動解析整月加班與請假紀錄)</span>
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label>日期</label>
            <input type="date" id="workDate">
        </div>
        <div class="form-group">
            <label>紀錄項目類別</label>
            <select id="workType" onchange="toggleTimeFields()">
                <option value="weekday">【加班】平日常態加班</option>
                <option value="restday">【加班】休息日/放假回公司</option>
                <option value="leave_spe">【請假】特別休假 (全薪)</option>
                <option value="leave_sick">【請假】普通傷病假 (半薪)</option>
                <option value="leave_fam">【請假】家庭照顧假 (無薪)</option>
                <option value="leave_men">【請假】生理假 (半薪)</option>
                <option value="leave_mourn">【請假】喪假 (全薪)</option>
                <option value="leave_personal">【請假】事假 (無薪)</option>
            </select>
        </div>
        <div class="form-group" id="timeStartGroup">
            <label id="startLabel">開始時間</label>
            <input type="time" id="startTime" value="17:30">
        </div>
        <div class="form-group" id="timeEndGroup">
            <label id="endLabel">結束時間</label>
            <input type="time" id="endTime" value="20:15">
        </div>
        <div class="form-group" id="breakGroup">
            <label>扣除休息(分鐘)</label>
            <input type="number" id="breakMins" value="0">
        </div>
        <div class="form-group" id="hoursGroup" style="display:none;">
            <label>請假時數 (小時)</label>
            <input type="number" id="leaveHours" value="8" min="1" max="8">
        </div>
        <div class="form-group" style="justify-content: flex-end;">
            <button type="button" onclick="addManualRecord()">新增此筆紀錄</button>
        </div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>日期</th>
                    <th>類別</th>
                    <th>時間 / 時數</th>
                    <th>淨時數</th>
                    <th>1.34倍時數</th>
                    <th>1.67倍時數</th>
                    <th>2.67倍時數</th>
                    <th>增減金額變化</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="recordTableBody"></tbody>
        </table>
    </div>

    <div class="total-box">
        <button class="clear-btn" onclick="clearRecords()">清除所有紀錄</button>
        <div style="display:flex; gap:20px; flex-wrap:wrap;">
            <div class="summary-item" style="color:#27ae60;">總累計加班費： +$<span id="totalOtPay">0</span> 元</div>
            <div class="summary-item" style="color:#c0392b;">總請假扣薪額： -$<span id="totalLeaveCut">0</span> 元</div>
            <div class="summary-item" style="color:#2c3e50; border-left:2px solid #ccc; padding-left:20px;">
                本月薪資預估增減： <span id="netSalaryChange" style="font-size:22px;">$0</span> 元
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('workDate').valueAsDate = new Date();
    let records = [];

    function updateHourlyWage() {
        const salary = parseFloat(document.getElementById('monthlySalary').value) || 0;
        const leaderAllowance = parseFloat(document.getElementById('leaderAllowance').value) || 0;
        
        // 雙軌制核心：加班費時薪納入加給；請假扣薪維持純底薪
        const hourlyWage = Math.round(((salary + leaderAllowance) / 240) * 100) / 100;
        const leaveHourlyWage = Math.round((salary / 240) * 100) / 100;
        const dailyWage = Math.round((salary / 30) * 100) / 100;
        
        document.getElementById('hourlyWageText').innerText = hourlyWage;
        document.getElementById('leaveHourlyWageText').innerText = leaveHourlyWage;
        
        return { hourlyWage, leaveHourlyWage, dailyWage };
    }

    function toggleTimeFields() {
        const type = document.getElementById('workType').value;
        if (type.startsWith('leave_')) {
            document.getElementById('timeStartGroup').style.display = 'none';
            document.getElementById('timeEndGroup').style.display = 'none';
            document.getElementById('breakGroup').style.display = 'none';
            document.getElementById('hoursGroup').style.display = 'block';
        } else {
            document.getElementById('timeStartGroup').style.display = 'block';
            document.getElementById('timeEndGroup').style.display = 'block';
            document.getElementById('breakGroup').style.display = 'block';
            document.getElementById('hoursGroup').style.display = 'none';
        }
    }

    window.onload = function() {
        updateHourlyWage();
        loadRecords();
    };

    function handleFile(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            parseFengData(jsonData);
        };
        reader.readAsArrayBuffer(file);
        input.value = '';
    }

    function parseFengData(rows) {
        if (rows.length === 0) return;
        
        const { hourlyWage, leaveHourlyWage } = updateHourlyWage();
        let importedCount = 0;

        let headerIndex = -1;
        for (let i = 0; i < rows.length; i++) {
            if (rows[i].includes("日期") && rows[i].includes("差勤紀錄")) {
                headerIndex = i;
                break;
            }
        }

        if (headerIndex === -1) {
            alert("找不到相符的鋒型報表格式！");
            return;
        }

        const headers = rows[headerIndex];
        const idxDate = headers.indexOf("日期");
        const idxStatus = headers.indexOf("狀態");
        const idxLeaveRecord = headers.indexOf("差勤紀錄");
        const idxOtRecord = headers.indexOf("加班紀錄");
        const idxActualHours = headers.indexOf("實到工時");

        for (let i = headerIndex + 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row || row.length === 0 || !row[idxDate]) continue;

            let dateStr = String(row[idxDate]).trim();
            if (dateStr.match(/^\d{2}-\d{2}/)) {
                const currentYear = new Date().getFullYear();
                dateStr = `${currentYear}-${dateStr.substring(0,5)}`;
            } else {
                dateStr = dateStr.substring(0, 10);
            }

            if (isNaN(Date.parse(dateStr))) continue;

            const status = row[idxStatus] ? String(row[idxStatus]).trim() : "";
            const leaveText = row[idxLeaveRecord] ? String(row[idxLeaveRecord]).trim() : "";
            const otText = row[idxOtRecord] ? String(row[idxOtRecord]).trim() : "";
            const actualHours = row[idxActualHours] ? parseFloat(row[idxActualHours]) || 0 : 0;

            let record = { id: Date.now() + i, date: dateStr };

            // 解析加班 (使用高階時薪 hourlyWage)
            if (otText && otText.includes("H")) {
                let otMatch = otText.match(/([\d.]+)\s*H\s*\((.*?)\)/);
                let otHours = 0;
                let timeRange = otText;
                
                if (otMatch) {
                    otHours = parseFloat(otMatch[1]);
                    timeRange = otMatch[2].replace(/\s+/g, '');
                } else {
                    let numMatch = otText.match(/([\d.]+)/);
                    if (numMatch) otHours = parseFloat(numMatch[1]);
                }

                if (otHours > 0) {
                    let r134 = 0, r167 = 0, r267 = 0, finalAmt = 0;
                    
                    if ((status.includes("排休") || status.includes("休息日")) && actualHours === 0) {
                        record.workType = "restday";
                        record.typeText = "休息日加班"; record.badgeClass = "bg-restday";
                        if (otHours <= 2) { r134 = otHours; } 
                        else if (otHours <= 8) { r134 = 2; r167 = otHours - 2; } 
                        else { r134 = 2; r167 = 6; r267 = otHours - 8; }
                    } else {
                        record.workType = "weekday";
                        record.typeText = "平日加班"; record.badgeClass = "bg-weekday";
                        if (otHours <= 2) { r134 = otHours; } else { r134 = 2; r167 = otHours - 2; }
                    }

                    finalAmt = Math.round((r134 * hourlyWage * (4/3)) + (r167 * hourlyWage * (5/3)) + (r267 * hourlyWage * (8/3)));
                    
                    record.timeStr = timeRange;
                    record.netHours = otHours;
                    record.r134 = r134; record.r167 = r167; record.r267 = r267;
                    record.amount = finalAmt;
                    
                    records.push(record);
                    importedCount++;
                }
            }

            // 解析請假 (使用扣薪專用時薪 leaveHourlyWage)
            if (leaveText && (leaveText.includes("假") || leaveText.includes("休"))) {
                let leaveHours = 8;
                let timeMatch = leaveText.match(/\((\d{2}):(\d{2})\s*-\s*(\d{2}):(\d{2})\)/);
                if (timeMatch) {
                    let sh = parseInt(timeMatch[1]), sm = parseInt(timeMatch[2]);
                    let eh = parseInt(timeMatch[3]), em = parseInt(timeMatch[4]);
                    let diffMins = (eh * 60 + em) - (sh * 60 + sm);
                    if (diffMins >= 540) diffMins -= 60; 
                    leaveHours = Math.round((diffMins / 60) * 100) / 100;
                    if (leaveHours <= 0) leaveHours = 8;
                }

                let cutAmt = 0;
                record.netHours = leaveHours;
                record.timeStr = `${leaveHours} 小時`;
                record.r134 = 0; record.r167 = 0; record.r267 = 0;

                if (leaveText.includes("特別休假") || leaveText.includes("特休")) {
                    record.workType = "leave_spe"; record.typeText = "特休 (全薪)"; record.badgeClass = "bg-leave-full";
                    cutAmt = 0;
                } else if (leaveText.includes("病假")) {
                    record.workType = "leave_sick"; record.typeText = "病假 (半薪)"; record.badgeClass = "bg-leave-half";
                    cutAmt = Math.round(leaveHours * leaveHourlyWage * 0.5);
                } else if (leaveText.includes("家庭照顧假")) {
                    record.workType = "leave_fam"; record.typeText = "家庭照顧 (無薪)"; record.badgeClass = "bg-leave-none";
                    cutAmt = Math.round(leaveHours * leaveHourlyWage);
                } else if (leaveText.includes("生理假")) {
                    record.workType = "leave_men"; record.typeText = "生理假 (半薪)"; record.badgeClass = "bg-leave-half";
                    cutAmt = Math.round(leaveHours * leaveHourlyWage * 0.5);
                } else if (leaveText.includes("事假")) {
                    record.workType = "leave_personal"; record.typeText = "事假 (無薪)"; record.badgeClass = "bg-leave-none";
                    cutAmt = Math.round(leaveHours * leaveHourlyWage);
                }

                record.amount = -cutAmt;
                records.push(record);
                importedCount++;
            }
        }

        saveRecords();
        renderTable();
        alert(`成功導入 ${importedCount} 筆精準紀錄！`);
    }

    function addManualRecord() {
        const date = document.getElementById('workDate').value;
        const workType = document.getElementById('workType').value;
        const { hourlyWage, leaveHourlyWage } = updateHourlyWage();
        if (!date) { alert('請選擇日期！'); return; }

        let record = { id: Date.now(), date, workType };

        if (!workType.startsWith('leave_')) {
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;
            const breakMins = parseFloat(document.getElementById('breakMins').value) || 0;
            if (!startTime || !endTime) { alert('請填寫上下班時間！'); return; }

            const start = new Date(`2026-01-01T${startTime}`);
            let end = new Date(`2026-01-01T${endTime}`);
            if (end < start) end.setDate(end.getDate() + 1);

            let totalMins = ((end - start) / 1000 / 60) - breakMins;
            if (totalMins < 0) totalMins = 0;
            const otHours = Math.round((totalMins / 60) * 100) / 100;

            let r134 = 0, r167 = 0, r267 = 0;
            if (workType === "weekday") {
                record.typeText = "平日加班"; record.badgeClass = "bg-weekday";
                if (otHours <= 2) { r134 = otHours; } else { r134 = 2; r167 = otHours - 2; }
            } else {
                record.typeText = "休息日加班"; record.badgeClass = "bg-restday";
                if (otHours <= 2) { r134 = otHours; } else if (otHours <= 8) { r134 = 2; r167 = otHours - 2; } else { r134 = 2; r167 = 6; r267 = otHours - 8; }
            }

            record.timeStr = `${startTime} ~ ${endTime}`;
            record.netHours = otHours;
            record.r134 = r134; record.r167 = r167; record.r267 = r267;
            record.amount = Math.round((r134 * hourlyWage * (4/3)) + (r167 * hourlyWage * (5/3)) + (r267 * hourlyWage * (8/3)));
        } else {
            const leaveHours = parseFloat(document.getElementById('leaveHours').value) || 0;
            let cutAmt = 0;
            record.netHours = leaveHours;
            record.timeStr = `${leaveHours} 小時`;
            
            if (workType === 'leave_spe') { record.typeText = "特休 (全薪)"; record.badgeClass = "bg-leave-full"; }
            else if (workType === 'leave_sick') { record.typeText = "病假 (半薪)"; record.badgeClass = "bg-leave-half"; cutAmt = leaveHours * leaveHourlyWage * 0.5; }
            else if (workType === 'leave_fam') { record.typeText = "家庭照顧 (無薪)"; record.badgeClass = "bg-leave-none"; cutAmt = leaveHours * leaveHourlyWage; }
            else if (workType === 'leave_men') { record.typeText = "生理假 (半薪)"; record.badgeClass = "bg-leave-half"; cutAmt = leaveHours * leaveHourlyWage * 0.5; }
            else if (workType === 'leave_personal') { record.typeText = "事假 (無薪)"; record.badgeClass = "bg-leave-none"; cutAmt = leaveHours * leaveHourlyWage; }
            
            record.amount = -Math.round(cutAmt);
        }
        records.push(record);
        saveRecords();
        renderTable();
    }

    function deleteRecord(id) { records = records.filter(r => r.id !== id); saveRecords(); renderTable(); }
    function clearRecords() { if (confirm('確定清除？')) { records = []; saveRecords(); renderTable(); } }
    function saveRecords() { localStorage.setItem('salary_records', JSON.stringify(records)); }
    function loadRecords() { const stored = localStorage.getItem('salary_records'); if (stored) { try { records = JSON.parse(stored); renderTable(); } catch(e) { records = []; } } }

    function renderTable() {
        const tbody = document.getElementById('recordTableBody');
        tbody.innerHTML = '';
        let totalOt = 0, totalCut = 0;
        records.sort((a,b) => new Date(a.date) - new Date(b.date));

        records.forEach(r => {
            const tr = document.createElement('tr');
            let amtText = r.amount > 0 ? `<span style="color:#27ae60; font-weight:bold;">+$${r.amount}</span>` : (r.amount < 0 ? `<span style="color:#c0392b; font-weight:bold;">-$${Math.abs(r.amount)}</span>` : `$0`);
            if (r.amount > 0) totalOt += r.amount; else totalCut += Math.abs(r.amount);

            tr.innerHTML = `<td>${r.date}</td><td><span class="badge ${r.badgeClass}">${r.typeText}</span></td><td>${r.timeStr}</td><td>${r.netHours}</td><td>${r.r134 || '-'}</td><td>${r.r167 || '-'}</td><td>${r.r267 || '-'}</td><td>${amtText}</td><td><button class="clear-btn" style="padding: 2px 8px; height:auto; font-size:12px;" onclick="deleteRecord(${r.id})">刪除</button></td>`;
            tbody.appendChild(tr);
        });

        document.getElementById('totalOtPay').innerText = totalOt;
        document.getElementById('totalLeaveCut').innerText = totalCut;
        const netChange = totalOt - totalCut;
        const netEl = document.getElementById('netSalaryChange');
        netEl.innerText = (netChange >= 0 ? `+$${netChange}` : `-$${Math.abs(netChange)}`);
        netEl.style.color = netChange >= 0 ? '#27ae60' : '#c0392b';
    }
</script>
</body>
</html>
